services:
  db:
    image: postgres:16-alpine
    container_name: harbourstay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: harbourstay
      POSTGRES_PASSWORD: harbourstay
      POSTGRES_DB: harbourstay
    ports:
      - "5432:5432"
    volumes:
      - harbourstay-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harbourstay -d harbourstay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  harbourstay-db-data:
